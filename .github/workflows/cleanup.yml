name: Clean Infra
on:
  workflow_dispatch:

# Define environment variables used throughout the workflow
env:
  TF_WORKING_DIR: ./terraform  
  PKR_WORKING_DIR: ./packer/centos    
  ANSIBLE_WORKING_DIR: ./ansible 
  AWS_REGION: us-east-1          

jobs:
  ###################################################################################
  # JOB 1: TERRAFORM DESTROY (Runs MANUALLY)
  ###################################################################################
  terraform_destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' &&  github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.13.x

    - name: Terraform Init
      id: init_tf
      run: terraform init
      env:
        TF_HTTP_ADDRESS: "https://gitlab.com/api/v4/projects/${{ env.GL_PROJECT_ID }}/terraform/state/${{ env.TF_STATE_NAME }}"
        TF_HTTP_LOCK_ADDRESS: "https://gitlab.com/api/v4/projects/${{ env.GL_PROJECT_ID }}/terraform/state/${{ env.TF_STATE_NAME }}/lock"
        TF_HTTP_UNLOCK_ADDRESS: "https://gitlab.com/api/v4/projects/${{ env.GL_PROJECT_ID }}/terraform/state/${{ env.TF_STATE_NAME }}/lock"
        TF_HTTP_USERNAME: ${{ env.GL_USERNAME }}
        TF_HTTP_PASSWORD: ${{ secrets.GITLAB_TF_TOKEN }}
    
    - name: Terraform Destroy
      id: destroy_tf
      run: terraform destroy -auto-approve
      env:
        TF_HTTP_ADDRESS: "https://gitlab.com/api/v4/projects/${{ env.GL_PROJECT_ID }}/terraform/state/${{ env.TF_STATE_NAME }}"
        TF_HTTP_USERNAME: ${{ env.GL_USERNAME }}
        TF_HTTP_PASSWORD: ${{ secrets.GITLAB_TF_TOKEN }}
    